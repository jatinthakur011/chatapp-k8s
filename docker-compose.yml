services:

  mysql:
    image: mysql:8.0

    container_name: mysql-container

    restart: always

    mem_limit: 1g
    cpus: 1

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - chat-network

  django:
    build: .

    container_name: django-container

    restart: always

    mem_limit: 512m
    cpus: 1

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - chat-network

  nginx:
    image: nginx:latest

    container_name: nginx-container

    restart: always

    mem_limit: 128m
    cpus: 0.5

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - django

    networks:
      - chat-network

networks:
  chat-network:

volumes:
  mysql-data:
    external: true
