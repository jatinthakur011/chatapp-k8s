apiVersion: apps/v1
kind: Deployment

metadata:
  name: django
  namespace: chatapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: django

  template:
    metadata:
      labels:
        app: django

    spec:

      initContainers:
      - name: wait-for-mysql
        image: busybox:1.35

        command:
        - sh
        - -c
        - |
          until nc -z mysql-db 3306; do
            echo "Waiting for MySQL..."
            sleep 5
          done

      containers:
      - name: django

        image: 730972070019.dkr.ecr.eu-north-1.amazonaws.com/chatapp:v1

        ports:
        - containerPort: 8000

        env:
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DB_NAME

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: DB_PASSWORD

        - name: DB_HOST
          value: "mysql-db"

        - name: DB_PORT
          value: "3306"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500Mi"
            memory: "512Mi"
